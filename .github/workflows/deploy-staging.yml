name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'
  PYTHON_VERSION: '3.11'

jobs:
  deploy-frontend:
    name: Deploy Frontend to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging-frontend
      url: https://staging.legacymind.ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
          NEXT_PUBLIC_ENV: staging

      - name: Deploy to Vercel/Netlify
        run: |
          echo "Deploy frontend to staging environment"
          # Add your deployment commands here
          # Example for Vercel: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          DEPLOY_TOKEN: ${{ secrets.STAGING_DEPLOY_TOKEN }}

  deploy-backend:
    name: Deploy Backend to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging-backend
      url: https://api-staging.legacymind.ai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run database migrations
        run: |
          echo "Run database migrations"
          # Add migration commands here
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Deploy to Cloud Platform
        run: |
          echo "Deploy backend to staging environment"
          # Add your deployment commands here
          # Example for AWS: aws deploy ...
          # Example for GCP: gcloud app deploy ...
          # Example for Azure: az webapp deploy ...
        env:
          CLOUD_CREDENTIALS: ${{ secrets.STAGING_CLOUD_CREDENTIALS }}

  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run frontend smoke tests
        run: |
          echo "Running frontend smoke tests"
          # Add smoke test commands
          # Example: npx playwright test --grep @smoke

      - name: Run backend health check
        run: |
          curl -f ${{ secrets.STAGING_API_URL }}/health || exit 1

      - name: Notify deployment status
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Staging deployment ${{ job.status }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

# Made with Bob
